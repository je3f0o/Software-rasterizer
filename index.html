<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jeefo Canvas Library</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --bg-dark: #0a0a0f;
      --bg-panel: #141419;
      --accent: #00ffcc;
      --accent-glow: rgba(0, 255, 204, 0.4);
      --text-main: #ffffff;
      --text-muted: #888899;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #top-bar {
      position: sticky;
      top: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    #header-title {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .github-link {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .github-link:hover { color: var(--accent); }
    .github-link svg { width: 28px; height: 28px; fill: currentColor; }

    #demos-container {
      max-width: 840px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 50px;
    }

    .demo-card {
      background: var(--bg-panel);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .demo-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
    }

    .demo-title { font-size: 1.1rem; font-weight: 600; }

    .demo-fps {
      font-family: monospace;
      font-size: 0.9rem;
      color: var(--accent);
      background: rgba(0, 255, 204, 0.1);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(0, 255, 204, 0.2);
    }

    .instruction-bar {
      background: rgba(0, 255, 204, 0.15);
      border-bottom: 1px solid rgba(0, 255, 204, 0.3);
      padding: 12px 20px;
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #181818;
    }

    canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
      outline: none;
      touch-action: none;
    }

    .canvas-overlay {
      position: absolute;
      background: rgba(20, 20, 25, 0.9);
      padding: 16px 32px;
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 204, 0.3);
      color: var(--accent);
      font-weight: 600;
      display: none;
      pointer-events: none;
      z-index: 10;
    }

    @media (max-width: 600px) {
      #demos-container { padding: 20px 10px; gap: 30px; }
      .demo-header { padding: 15px; }
      .instruction-bar { font-size: 0.85rem; padding: 10px 15px; }
    }
  </style>
</head>
<body>

  <div id="top-bar">
    <div id="header-title">Jeefo Canvas</div>
    <a href="https://github.com/je3f0o/Software-rasterizer" target="_blank" rel="noopener noreferrer" class="github-link" title="View Source on GitHub">

      </svg>
    </a>
  </div>

  <div id="demos-container">
    <!-- Demos injected by JS -->
  </div>

  <script src="main.js" type="module"></script>
</body>
</html>
